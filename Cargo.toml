[workspace]
members = [
  "packages/shell",
  "packages/shell-exec",
  "packages/coreutils",
  "packages/pdf-tools",
  "packages/xlsx-tools",
  "packages/test-fixtures/hello",
  "packages/test-fixtures/echo-args",
  "packages/test-fixtures/cat-stdin",
  "packages/test-fixtures/wc-bytes",
  "packages/test-fixtures/true-cmd",
  "packages/test-fixtures/false-cmd",
  "packages/python",
  # Sub-repository crates (numpy-rust, pillow-rust, matplotlib-py, pandas-rust)
  "packages/numpy-rust/crates/numpy-rust-core",
  "packages/numpy-rust/crates/numpy-rust-python",
  "packages/numpy-rust/crates/numpy-rust-wasm",
  "packages/pillow-rust/crates/pil-rust-core",
  "packages/pillow-rust/crates/pil-rust-python",
  "packages/matplotlib-py/crates/matplotlib-python",
  "packages/pandas-rust/crates/pandas-rust-core",
  "packages/pandas-rust/crates/pandas-rust-python",
  "packages/pandas-rust/crates/pandas-rust-wasm",
  # Host binary: Wasmtime-based sandbox server (Option 2 backend)
  "packages/sdk-server-wasmtime",
  # Rust MCP server (wasmtime backend)
  "packages/mcp-server-rust",
]
exclude = [
  "packages/sips",
]
resolver = "2"

[workspace.dependencies]
rustpython = { git = "https://github.com/RustPython/RustPython", rev = "f9ca63893", default-features = false }
rustpython-vm = { git = "https://github.com/RustPython/RustPython", rev = "f9ca63893" }
rustpython-derive = { git = "https://github.com/RustPython/RustPython", rev = "f9ca63893" }

[profile.release]
lto = true
opt-level = "z"
strip = true
