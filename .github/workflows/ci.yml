name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: deno install

      - name: Build TypeScript
        run: cd packages/orchestrator && npx tsup

      - name: Run TypeScript tests
        timeout-minutes: 10
        run: |
          rc=0
          deno test -A --no-check --junit-path=test-results.xml \
            packages/orchestrator packages/sdk-server packages/mcp-server 2>&1 || rc=$?
          if [ $rc -ne 0 ]; then
            # Deno may exit non-zero when Worker threads leave pending promises
            # during cleanup, even when all tests pass. Check JUnit XML for
            # actual failures before failing the build.
            if grep -q 'failures="0"' test-results.xml 2>/dev/null && \
               grep -q 'errors="0"' test-results.xml 2>/dev/null; then
              echo "::warning::Deno exited non-zero but all tests passed (Worker cleanup issue)"
            else
              exit 1
            fi
          fi

      - name: Install Python SDK
        run: cd packages/python-sdk && pip install -e ".[dev]"

      - name: Run Python tests
        run: cd packages/python-sdk && python -m pytest tests/ -v

      - name: Build MCP server
        run: ./scripts/build-mcp.sh

      - name: Smoke-test MCP server
        run: |
          WASM_DIR=packages/orchestrator/src/platform/__tests__/fixtures
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"0.1"}}}\n{"jsonrpc":"2.0","method":"notifications/initialized"}\n{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"run_command","arguments":{"command":"echo mcp-ok"}}}\n' \
            | ./dist/codepod-mcp --wasm-dir "$WASM_DIR" --shell-wasm "$WASM_DIR/codepod-shell-exec.wasm" 2>/dev/null \
            | grep -q '"mcp-ok"'
          echo "MCP smoke test passed"
