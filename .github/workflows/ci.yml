name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - run: deno install

      - name: Build TypeScript
        run: cd packages/orchestrator && npx tsup

      - name: Run TypeScript tests
        timeout-minutes: 10
        run: |
          rc=0
          deno test -A --no-check --junit-path=test-results.xml \
            packages/orchestrator packages/sdk-server packages/mcp-server 2>&1 || rc=$?
          if [ $rc -ne 0 ]; then
            # Deno may exit non-zero when Worker threads leave pending promises
            # during cleanup, even when all tests pass. Check JUnit XML for
            # actual failures before failing the build.
            if grep -q 'failures="0"' test-results.xml 2>/dev/null && \
               grep -q 'errors="0"' test-results.xml 2>/dev/null; then
              echo "::warning::Deno exited non-zero but all tests passed (Worker cleanup issue)"
            else
              exit 1
            fi
          fi

      - name: Install Python SDK
        run: cd packages/python-sdk && pip install -e ".[dev]"

      - name: Run Python tests
        run: cd packages/python-sdk && python -m pytest tests/ -v

      - name: Run browser tests (Chromium + WebKit)
        run: |
          cd packages/orchestrator/browser-tests
          npm ci
          npx playwright install --with-deps chromium webkit
          node_modules/.bin/playwright test --reporter=line

      - name: Build MCP server
        run: ./scripts/build-mcp.sh

      - name: Smoke-test MCP server
        run: bash scripts/smoke-test-mcp.sh

  test-wasmtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build wasmtime server
        run: bash scripts/build-sdk-server.sh

      - name: Run integration tests (wasmtime)
        run: |
          SERVER_BINARY=dist/codepod-server \
          deno test -A --no-check packages/integration-tests/tests/

  test-deno-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - run: deno install

      - name: Build TypeScript orchestrator
        run: cd packages/orchestrator && npx tsup

      - name: Run integration tests (deno sdk-server)
        run: |
          SERVER_BINARY="$HOME/.deno/bin/deno" \
          SERVER_ARGS="run -A --no-check --unstable-sloppy-imports packages/sdk-server/src/server.ts" \
          deno test -A --no-check packages/integration-tests/tests/
