canary = "pthread-canary"
summary = "pthread Tier 1 surface — 4-thread mutex stress test (§Migration Path Step 1)."

[[case]]
name = "four_thread_mutex_counter"
inputs = "spawn 4 threads, each increments shared counter 10000 times under mutex, join all"
