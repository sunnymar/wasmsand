[package]
name = "cpcc-toolchain"
version = "0.1.0"
edition = "2021"
publish = false
description = "Clang wrapper and companion tooling for the codepod guest compatibility runtime."

[[bin]]
name = "cpcc"
path = "src/main.rs"

[[bin]]
name = "cpar"
path = "src/bin/cpar.rs"

[[bin]]
name = "cpranlib"
path = "src/bin/cpranlib.rs"

[[bin]]
name = "cpcheck"
path = "src/bin/cpcheck.rs"

[[bin]]
name = "cpconf"
path = "src/bin/cpconf.rs"

[[bin]]
name = "cargo-codepod"
path = "src/bin/cargo-codepod.rs"

[lib]
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
which = "6"
wasmparser = "0.247.0"
toml = { version = "0.8", default-features = false, features = ["parse"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
